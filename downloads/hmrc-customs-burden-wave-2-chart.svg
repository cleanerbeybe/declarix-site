<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"><title>HMRC Customs Administrative Burden Wave 2 headline findings</title><desc>Survey of 460 declarants: 70 percent customs intermediaries, typical processes averaging 19 to 28 minutes, internal cost from 5 to 7 pounds, and approximately 70 percent saying automated data entry would help.</desc><rect width="1200" height="630" fill="#f4f1e9"/><rect x="40" y="40" width="1120" height="550" fill="none" stroke="#17333d" stroke-width="2"/><text x="70" y="91" font-family="monospace" font-size="17" fill="#5a6c73">HMRC / IPSOS · WAVE 2 · PUBLISHED 26 FEBRUARY 2026</text><text x="70" y="158" font-family="Arial,sans-serif" font-weight="800" font-size="54" fill="#17333d">460 declarants</text><g transform="translate(70 210)"><rect width="500" height="72" fill="#17333d"/><rect width="350" height="72" fill="#1e7f4d"/><text x="20" y="45" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#fff">70% intermediaries</text><text x="518" y="45" font-family="monospace" font-size="19" fill="#17333d">30% traders</text></g><g transform="translate(70 330)"><text y="30" font-family="monospace" font-size="17" fill="#5a6c73">AVERAGE TYPICAL-PROCESS TIME</text><text y="100" font-family="Arial,sans-serif" font-weight="800" font-size="65" fill="#17333d">19–28 min</text></g><g transform="translate(660 330)"><text y="30" font-family="monospace" font-size="17" fill="#5a6c73">INTERNAL COST / PROCESS</text><text y="100" font-family="Arial,sans-serif" font-weight="800" font-size="65" fill="#17333d">£5–£7</text></g><text x="70" y="544" font-family="Arial,sans-serif" font-size="22" fill="#17333d">≈70% across process types said automated data entry would help.</text></svg>