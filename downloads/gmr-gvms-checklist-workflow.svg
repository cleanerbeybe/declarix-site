<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"><title>GMR / GVMS five-step handoff</title><desc>Five operational checkpoints for GMR and GVMS checklist for a border-ready movement.</desc><rect width="1200" height="630" fill="#f4f1e9"/><rect x="40" y="40" width="1120" height="550" fill="none" stroke="#17333d" stroke-width="2"/><text x="70" y="86" font-family="monospace" font-size="16" fill="#5a6c73">DECLARIX · CUSTOMS WORKFLOW</text><text x="1110" y="86" text-anchor="end" font-family="monospace" font-weight="700" font-size="19" fill="#17333d">GMR / GVMS</text><g><circle cx="90" cy="130" r="27" fill="#c8781c"/><text x="90" y="136" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">01</text><text x="140" y="125" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Confirm the route</text><text x="140" y="154" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Check the port and direction use GVMS before the movement is built.</text><path d="M90 159 V189" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="216" r="27" fill="#c8781c"/><text x="90" y="222" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">02</text><text x="140" y="211" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Collect every reference</text><text x="140" y="240" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Reconcile import, export, transit and safety-and-security references for all goods carried.</text><path d="M90 245 V275" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="302" r="27" fill="#c8781c"/><text x="90" y="308" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">03</text><text x="140" y="297" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Create and repair the GMR</text><text x="140" y="326" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Resolve rule failures until the GMR is OPEN; NOT_FINALISABLE is not ready for check-in.</text><path d="M90 331 V361" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="388" r="27" fill="#c8781c"/><text x="90" y="394" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">04</text><text x="140" y="383" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Match the physical movement</text><text x="140" y="412" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Vehicle registration, trailer or container identifiers must match what reaches the carrier.</text><path d="M90 417 V447" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="474" r="27" fill="#1e7f4d"/><text x="90" y="480" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">05</text><text x="140" y="469" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Present and follow the outcome</text><text x="140" y="498" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Give the GMR to the carrier and check whether the goods must report for inspection.</text></g></svg>