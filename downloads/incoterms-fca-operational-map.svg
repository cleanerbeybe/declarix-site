<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"><title>FCA delivery, cost and risk handoff</title><desc>Four-stage operational map for Free Carrier, showing the responsible party and risk handoff.</desc><rect width="1200" height="630" fill="#f4f1e9"/><rect x="40" y="40" width="1120" height="550" fill="none" stroke="#17333d" stroke-width="2"/><text x="70" y="98" font-family="monospace" font-size="18" fill="#5a6c73">DECLARIX · INCOTERMS OPERATIONAL ATLAS</text><text x="70" y="145" font-family="Arial,sans-serif" font-weight="800" font-size="42" fill="#17333d">FCA · Free Carrier</text><g><rect x="70" y="170" width="220" height="180" fill="#ffffff" stroke="#17333d"/><text x="88" y="210" font-family="monospace" font-size="17" fill="#5a6c73">01</text><text x="88" y="252" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#17333d">Export</text><text x="88" y="279" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#17333d">preparation</text><text x="88" y="318" font-family="monospace" font-size="16" fill="#1e7f4d">Seller</text></g><g><rect x="330" y="170" width="220" height="180" fill="#e8e4d8" stroke="#17333d"/><text x="348" y="210" font-family="monospace" font-size="17" fill="#5a6c73">02</text><text x="348" y="252" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#17333d">Named place ·</text><text x="348" y="279" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#17333d">carrier handoff</text><text x="348" y="318" font-family="monospace" font-size="16" fill="#1e7f4d">Seller → Buyer risk</text></g><g><rect x="590" y="170" width="220" height="180" fill="#ffffff" stroke="#17333d"/><text x="608" y="210" font-family="monospace" font-size="17" fill="#5a6c73">03</text><text x="608" y="252" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#17333d">Main carriage</text><text x="608" y="318" font-family="monospace" font-size="16" fill="#1e7f4d">Buyer</text></g><g><rect x="850" y="170" width="220" height="180" fill="#e8e4d8" stroke="#17333d"/><text x="868" y="210" font-family="monospace" font-size="17" fill="#5a6c73">04</text><text x="868" y="252" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#17333d">UK import and</text><text x="868" y="279" font-family="Arial,sans-serif" font-weight="700" font-size="22" fill="#17333d">delivery</text><text x="868" y="318" font-family="monospace" font-size="16" fill="#1e7f4d">Buyer</text></g><path d="M70 410 H1110" stroke="#c8781c" stroke-width="14"/><text x="70" y="466" font-family="Arial,sans-serif" font-size="22" fill="#17333d">Risk moves when delivery to the carrier is completed at the named place.</text><text x="70" y="548" font-family="monospace" font-size="15" fill="#5a6c73">SOURCE-LED WORKPAPER · CHECK THE CONTRACT, NAMED PLACE AND CURRENT OFFICIAL GUIDANCE</text></svg>