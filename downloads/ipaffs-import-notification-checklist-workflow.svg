<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img"><title>IPAFFS five-step handoff</title><desc>Five operational checkpoints for IPAFFS import notification and document handoff checklist.</desc><rect width="1200" height="630" fill="#f4f1e9"/><rect x="40" y="40" width="1120" height="550" fill="none" stroke="#17333d" stroke-width="2"/><text x="70" y="86" font-family="monospace" font-size="16" fill="#5a6c73">DECLARIX · CUSTOMS WORKFLOW</text><text x="1110" y="86" text-anchor="end" font-family="monospace" font-weight="700" font-size="19" fill="#17333d">IPAFFS</text><g><circle cx="90" cy="130" r="27" fill="#c8781c"/><text x="90" y="136" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">01</text><text x="140" y="125" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Classify the control route</text><text x="140" y="154" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Identify the product family, origin and current risk category before choosing the</text><text x="140" y="173" font-family="Arial,sans-serif" font-size="17" fill="#40565f">notification path.</text><path d="M90 159 V189" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="216" r="27" fill="#c8781c"/><text x="90" y="222" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">02</text><text x="140" y="211" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Check place and time</text><text x="140" y="240" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Confirm an eligible border control post and the source-specific pre-notification deadline.</text><path d="M90 245 V275" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="302" r="27" fill="#c8781c"/><text x="90" y="308" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">03</text><text x="140" y="297" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Assemble health evidence</text><text x="140" y="326" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Match certificates, commercial documents, commodity lines and transport details.</text><path d="M90 331 V361" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="388" r="27" fill="#c8781c"/><text x="90" y="394" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">04</text><text x="140" y="383" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Submit the IPAFFS notification</text><text x="140" y="412" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Upload the required documents and retain the notification reference and version.</text><path d="M90 417 V447" stroke="#17333d" stroke-width="2"/></g><g><circle cx="90" cy="474" r="27" fill="#1e7f4d"/><text x="90" y="480" text-anchor="middle" font-family="monospace" font-size="17" fill="#fff">05</text><text x="140" y="469" font-family="Arial,sans-serif" font-weight="700" font-size="23" fill="#17333d">Join the arrival handoff</text><text x="140" y="498" font-family="Arial,sans-serif" font-size="17" fill="#40565f">Keep IPAFFS, customs declaration, certificates and BCP instructions aligned through arrival.</text></g></svg>