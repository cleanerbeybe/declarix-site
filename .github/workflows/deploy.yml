name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_POSTHOG_KEY: ${{ vars.POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ vars.POSTHOG_HOST }}
          VITE_GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
          VITE_BING_SITE_VERIFICATION: ${{ vars.BING_SITE_VERIFICATION }}
          VITE_PUBLIC_EORI_RELEASE_ENABLED: ${{ vars.PUBLIC_EORI_RELEASE_ENABLED }}
          VITE_PUBLIC_EORI_API_ORIGIN: ${{ vars.PUBLIC_EORI_API_ORIGIN }}
      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git branch -M gh-pages
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
      - name: Notify IndexNow of the deployed sitemap URLs
        continue-on-error: true
        run: |
          for attempt in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error https://getdeclarix.com/indexnow.txt >/dev/null; then
              break
            fi
            sleep 5
          done
          npm run submit:indexnow
